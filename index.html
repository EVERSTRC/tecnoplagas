<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TecnoPlagas Pro v25.3 - PWA</title>
    
    <!-- Configuración para instalación en dispositivos móviles -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1e21">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f5f7;
            color: #333;
            padding: 15px;
            padding-bottom: 40px;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .navbar {
            background-color: #fff;
            display: flex;
            justify-content: flex-start;
            padding: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border-radius: 8px;
            overflow-x: auto;
        }
        .navbar button {
            background: none;
            border: none;
            color: #6c757d;
            font-weight: 700;
            font-size: 11px;
            padding: 14px 16px;
            margin: 0 2px;
            border-radius: 6px;
            text-transform: uppercase;
            cursor: pointer;
            white-space: nowrap;
        }
        .navbar button.active {
            background-color: #1a1e21;
            color: #fff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 12px;
        }
        .line-indicator {
            width: 5px;
            height: 22px;
            margin-right: 10px;
            border-radius: 3px;
        }
        .bg-grey { background-color: #4a5568; }
        .bg-red { background-color: #dc3545; }
        .bg-green { background-color: #28a745; }
        .bg-warning { background-color: #ffc107; }
        .bg-info { background-color: #0dcaf0; }
        .bg-blue { background-color: #0d6efd; }
        
        .section-header h2 {
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 15px;
        }
        .col {
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .w-20  { grid-column: span 2; }  
        .w-30  { grid-column: span 4; }  
        .w-33  { grid-column: span 4; }  
        .w-40  { grid-column: span 5; }  
        .w-50  { grid-column: span 6; }
        .w-60  { grid-column: span 7; }  
        .w-70  { grid-column: span 10; } 
        .w-100 { grid-column: span 12; } 

        label {
            font-size: 11px;
            font-weight: 700;
            color: #4a5568;
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        input, select, textarea {
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 15px;
            color: #2d3748;
            height: 46px;
            width: 100%;
            outline: none;
        }
        textarea { height: 80px; resize: none; }
        select[multiple] { height: 120px; font-size: 13px; }
        input:focus, select:focus, textarea:focus { border-color: #3182ce; }
        input:read-only {
            background-color: #fffaf0;
            color: #ff4757;
            font-weight: bold;
            border-color: #ff4757;
            cursor: not-allowed;
        }
        .input-group { display: flex; gap: 8px; }
        .btn-action {
            background-color: #4a5568;
            color: white;
            border: none;
            padding: 0 15px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            height: 46px;
            white-space: nowrap;
        }
        .btn-submit {
            width: 100%;
            color: white;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: 800;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 20px;
            height: 50px;
        }
        .btn-grey { background-color: #4a5568; }
        .btn-red { background-color: #dc3545; }
        .btn-green { background-color: #28a745; }
        .btn-warning { background-color: #ffc107; color: #333; }
        .btn-info { background-color: #0dcaf0; color: white; }
        .btn-blue { background-color: #0d6efd; }
        
        .sub-box {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 15px;
            grid-column: span 12;
            margin-top: 10px;
        }
        .table-app {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 13px;
        }
        .table-app th, .table-app td {
            border: 1px solid #cbd5e1;
            padding: 10px;
            text-align: left;
        }
        .table-app th { background-color: #1a1e21; color: white; }
        
        .search-results {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 5px;
            display: none;
            position: absolute;
            top: 65px;
            width: 100%;
            z-index: 10;
        }
        .search-item { padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #edf2f7; }
        .search-item:hover { background-color: #ebf8ff; }

        @media (max-width: 850px) { .w-15, .w-20, .w-30, .w-33, .w-40, .w-50, .w-60 { grid-column: span 6; } }
        @media (max-width: 550px) { .w-15, .w-20, .w-30, .w-33, .w-40, .w-50, .w-60 { grid-column: span 12; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <button id="btnTabClientes" class="active" onclick="cambiarPestana('clientes')">CLIENTES</button>
        <button id="btnTabCalendario" onclick="cambiarPestana('calendario')">CALENDARIO</button>
        <button id="btnTabCebaderos" onclick="cambiarPestana('cebaderos')">CEBADEROS</button>
        <button id="btnTabVisitas" onclick="cambiarPestana('visitas')">VISITAS</button>
        <button id="btnTabFactura" onclick="cambiarPestana('factura')">FACTURA</button>
        <button id="btnTabConsulta" onclick="cambiarPestana('consulta')">CONSULTA</button>
    </nav>

    <div class="container">
        
        <!-- MÓDULO 1: MAESTRO DE CLIENTES -->
        <div id="pantallaClientes" class="tab-content active">
            <div class="section-header">
                <div class="line-indicator bg-grey"></div>
                <h2>MAESTRO DE CLIENTES</h2>
            </div>
            <form id="clientForm">
                <div class="form-grid">
                    <div class="col w-20"><label>CONSECUTIVO</label><input type="text" id="c_con" readonly></div>
                    <div class="col w-70"><label>NOMBRE COMPLETO</label><input type="text" id="c_nom" required autocomplete="off"></div>
                    <div class="col w-30"><label>ID (CÉDULA)</label><input type="text" id="c_id" required autocomplete="off"></div>
                    <div class="col w-33"><label>SUCURSAL</label><input type="text" id="c_suc" autocomplete="off"></div>
                    <div class="col w-33"><label>TELÉFONO</label><input type="tel" id="c_tel" autocomplete="off"></div>
                    <div class="col w-33"><label>EMAIL</label><input type="email" id="c_mail" autocomplete="off"></div>
                    <div class="col w-20"><label>LOCALIZAR</label><input type="text" id="c_loc" autocomplete="off"></div>
                    <div class="col w-40"><label>DIRECCIÓN</label><input type="text" id="c_dir" autocomplete="off"></div>
                    <div class="col w-40"><label>GPS</label>
                        <div class="input-group">
                            <input type="text" id="c_gps" placeholder="Lat, Lon" autocomplete="off">
                            <button type="button" class="btn-action" onclick="obtenerUbicacionActual('c_gps')">📍 GPS</button>
                        </div>
                    </div>
                    <div class="col w-33"><label>FECHA REGISTRO</label><input type="date" id="c_freg"></div>
                </div>
                <button type="submit" class="btn-submit btn-grey">GUARDAR CLIENTE</button>
            </form>
        </div>

        <!-- MÓDULO 2: CALENDARIO -->
        <div id="pantallaCalendario" class="tab-content">
            <div class="section-header">
                <div class="line-indicator bg-red"></div>
                <h2>AGENDAR CITA EN GOOGLE CALENDAR</h2>
            </div>
            <form id="calendarForm">
                <div class="form-grid">
                    <div class="col w-60"><label>SELECCIONAR CLIENTE</label><select id="cal_nom" class="select-clientes" onchange="autoFillCal()" required></select></div>
                    <div class="col w-40"><label>SUCURSAL</label><input type="text" id="cal_suc"></div>
                    <div class="col w-33"><label>FECHA DE CITA</label><input type="date" id="cal_fec" required></div>
                    <div class="col w-33"><label>HORA DE INICIO</label><input type="time" id="cal_hor" required></div>
                    <div class="col w-33"><label>DURACIÓN (HORAS)</label><input type="number" id="cal_dur" value="1"></div>
                    <div class="col w-100"><label>DIRECCIÓN (UBICACIÓN EN MAPA)</label><input type="text" id="cal_dir" readonly></div>
                    <div class="col w-50"><label>TIPO DE SERVICIO</label><select id="cal_tip"><option>Fumigación General</option><option>Control de Roedores</option><option>Inspección técnica</option><option>Refuerzo</option></select></div>
                    <div class="col w-50"><label>NOTAS ADICIONALES</label><input type="text" id="cal_not"></div>
                </div>
                <button type="submit" class="btn-submit btn-red">SINCRONIZAR CON GOOGLE CALENDAR</button>
            </form>
        </div>

        <!-- MÓDULO 3: CONTROL DE CEBADEROS -->
        <div id="pantallaCebaderos" class="tab-content">
            <div class="section-header">
                <div class="line-indicator bg-green"></div>
                <h2>CONTROL DE CEBADEROS</h2>
            </div>
            <form id="cebaderosForm">
                <div class="form-grid">
                    <div class="col w-20"><label>CONSECUTIVO</label><input type="text" id="ceb_con" readonly></div>
                    <div class="col w-60"><label>NOMBRE CLIENTE</label><select id="ceb_nom" class="select-clientes" onchange="autoFillCeb()" required></select></div>
                    <div class="col w-40"><label>SUCURSAL</label><input type="text" id="ceb_suc"></div>
                    <div class="col w-40"><label>FECHA</label><input type="date" id="ceb_fec" required></div>
                    <div class="col w-40"><label>HORA</label><input type="time" id="ceb_hor" required></div>
                    <div class="col w-40"><label>TIPO</label><select id="ceb_tip"><option>Control de Plagas</option><option>Refuerzo</option></select></div>
                    <div class="col w-100"><label>TÉCNICO ASIGNADO</label><input type="text" id="ceb_tec" required></div>
                    
                    <div class="sub-box">
                        <div class="form-grid">
                            <div class="col w-20"><label>Estación #</label><input type="text" id="i_est"></div>
                            <div class="col w-50"><label>Producto Utilizado</label><select id="i_pro"><option>(Rodenticida-Broditop-Brodifacoum-20-30g / m)</option><option>(Rodenticida-Gardentop-Bromadiolona-20-30g / m)</option><option>(Rodenticida-Storm-Coumarin Flocoumafen-20-30g / m)</option></select></div>
                            <div class="col w-50"><label>Incidencia</label><select id="i_inc"><option>Limpieza-Cambio Cebo</option><option>Inactiva</option><option>Activa</option></select></div>
                            <div class="col w-100"><button type="button" class="btn-submit btn-green" style="margin-top:5px; height:40px;" onclick="addEstacion()">AÑADIR ESTACIÓN</button></div>
                        </div>
                        <table class="table-app"><thead><tr><th>Est.</th><th>Producto</th><th>Incidencia</th><th>X</th></tr></thead><tbody id="lista_estaciones"></tbody></table>
                    </div>
                </div>
                <button type="submit" class="btn-submit btn-green">GUARDAR REPORTE</button>
            </form>
        </div>

        <!-- MÓDULO 4: REGISTRO DE VISITAS -->
        <div id="pantallaVisitas" class="tab-content">
            <div class="section-header">
                <div class="line-indicator bg-warning"></div>
                <h2>REGISTRO DE VISITAS</h2>
            </div>
            <form id="visitasForm">
                <div class="form-grid">
                    <div class="col w-20"><label>CONSECUTIVO</label><input type="text" id="v_con" readonly></div>
                    <div class="col w-60"><label>CLIENTE</label><select id="v_nom" class="select-clientes" onchange="autoFillVis()" required></select></div>
                    <div class="col w-40"><label>SUCURSAL</label><input type="text" id="v_suc"></div>
                    <div class="col w-50"><label>FECHA VISITA</label><input type="date" id="v_fec" required></div>
                    <div class="col w-50"><label>HORA VISITA</label><input type="time" id="v_hor" required></div>
                    <div class="col w-50"><label>INSECTOS RASTREROS (Ctrl+Click)</label><select id="v_ras" multiple><option selected>NINGUNO</option><option>ARAÑAS</option><option>CHINCHES</option><option>C GERMÁNICA</option><option>HORMIGAS</option></select></div>
                    <div class="col w-50"><label>INSECTOS VOLADORES (Ctrl+Click)</label><select id="v_vol" multiple><option selected>NINGUNO</option><option>MOSCAS</option><option>MOSQUITOS</option></select></div>
                    <div class="col w-100"><label>MÉTODO APLICADO (Ctrl+Click)</label><select id="v_met" multiple required><option selected>Aspersión</option><option>Nebulización</option><option>Gel</option></select></div>
                    <div class="col w-100"><label>COMENTARIO DE INSPECCIÓN</label><textarea id="v_com" rows="2"></textarea></div>
                </div>
                <button type="submit" class="btn-submit btn-warning">GUARDAR VISITA</button>
            </form>
        </div>

        <!-- MÓDULO 5: FACTURACIÓN -->
        <div id="pantallaFactura" class="tab-content">
            <div class="section-header">
                <div class="line-indicator bg-info"></div>
                <h2>FACTURACIÓN</h2>
            </div>
            <form id="facturaForm">
                <div class="form-grid">
                    <div class="col w-30"><label>FACTURA #</label><input type="text" id="f_con" readonly></div>
                    <div class="col w-60"><label>CLIENTE</label><select id="f_nom" class="select-clientes" onchange="autoFillFact()" required></select></div>
                    <div class="col w-30"><label>ID (CÉDULA)</label><input type="text" id="f_id" readonly style="background:#f8f9fa; border-color:#cbd5e1; color:#333;"></div>
                    
                    <div class="col w-20"><label>CANTIDAD</label><input type="number" id="f_can" value="1" oninput="calcTotal()" required></div>
                    <div class="col w-50"><label>DESCRIPCIÓN</label><input type="text" id="f_des" placeholder="Ej. Servicio de Fumigación" required autocomplete="off"></div>
                    <div class="col w-30"><label>PRECIO UNITARIO</label><input type="number" id="f_pre" placeholder="0.00" oninput="calcTotal()" required></div>
                    
                    <div class="col w-20"><label>IVA (13%)</label><input type="text" id="f_iva" readonly style="background:#f8f9fa; border-color:#cbd5e1; color:#333;"></div>
                    <div class="col w-40"><label style="color:#0d6efd;">TOTAL NETO</label><input type="text" id="f_tot" readonly style="background:#eef2ff; border-color:#0d6efd; color:#0d6efd;"></div>
                </div>
                <button type="submit" class="btn-submit btn-info">REGISTRAR FACTURA</button>
            </form>
        </div>

        <!-- MÓDULO 6: CONSULTA -->
        <div id="pantallaConsulta" class="tab-content">
            <div class="section-header">
                <div class="line-indicator bg-blue"></div>
                <h2>CONSULTA DE CLIENTES</h2>
            </div>
            <div class="col w-100" style="margin-bottom: 25px;">
                <label>BUSCAR POR NOMBRE</label>
                <input type="text" id="inputBuscador" placeholder="Escribe para buscar..." onkeyup="filtrarClientes()" autocomplete="off">
                <div id="resultadosBusqueda" class="search-results"></div>
            </div>
        </div>

    </div>

    <script>
        // NUEVA URL DE IMPLEMENTACIÓN ASIGNADA POR EL USUARIO
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2vfiyh51puq8CNcSxadj_VcGaBitMmRsyV_p7Juyh2qabdWrLjNR3WFEnNYsbvzWk/exec";
        
        let dbClientes = []; 
        let estTemp = [];
        let cnt = JSON.parse(localStorage.getItem('tp_cnt_v25.3')) || { c:1, ceb:1, v:1, f:1 };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.error('PWA Error', err));
            });
        }

        async function loadData() {
            try {
                const r = await fetch(SCRIPT_URL);
                const response = await r.json();
                dbClientes = response.clientes || [];
                
                document.querySelectorAll('.select-clientes').forEach(s => {
                    s.innerHTML = '<option value="">-- Seleccionar --</option>' + 
                                  dbClientes.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('');
                });
            } catch(e) { console.log("Error de red al cargar base de datos."); }
        }

        // Controlador de navegación por pestañas de la interfaz
        function cambiarPestana(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.navbar button').forEach(l => l.classList.remove('active'));
            
            if(id === 'clientes') { document.getElementById('pantallaClientes').classList.add('active'); document.getElementById('btnTabClientes').classList.add('active'); }
            if(id === 'calendario') { document.getElementById('pantallaCalendario').classList.add('active'); document.getElementById('btnTabCalendario').classList.add('active'); }
            if(id === 'cebaderos') { document.getElementById('pantallaCebaderos').classList.add('active'); document.getElementById('btnTabCebaderos').classList.add('active'); }
            if(id === 'visitas') { document.getElementById('pantallaVisitas').classList.add('active'); document.getElementById('btnTabVisitas').classList.add('active'); }
            if(id === 'factura') { document.getElementById('pantallaFactura').classList.add('active'); document.getElementById('btnTabFactura').classList.add('active'); }
            if(id === 'consulta') { document.getElementById('pantallaConsulta').classList.add('active'); document.getElementById('btnTabConsulta').classList.add('active'); }
            
            updateCons();
        }

        function updateCons() {
            document.getElementById('c_con').value = "CL-" + String(cnt.c).padStart(4,'0');
            document.getElementById('ceb_con').value = "CEB-" + String(cnt.ceb).padStart(4,'0');
            document.getElementById('v_con').value = "VIS-" + String(cnt.v).padStart(4,'0');
            document.getElementById('f_con').value = "FAC-" + String(cnt.f).padStart(4,'0');
        }

        function obtenerUbicacionActual(idDestino) {
            const inputGps = document.getElementById(idDestino);
            if (!navigator.geolocation) { return alert("GPS no soportado."); }
            inputGps.value = "Localizando...";
            navigator.geolocation.getCurrentPosition(
                (pos) => { inputGps.value = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`; },
                () => { inputGps.value = ""; alert("Active el GPS en su tablet."); },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function autoFillCal() {
            const c = dbClientes.find(x => x.nombre === document.getElementById('cal_nom').value);
            if(c) { document.getElementById('cal_dir').value = c.direccion || ''; document.getElementById('cal_suc').value = c.sucursal || ''; }
        }
        function autoFillCeb() {
            const c = dbClientes.find(x => x.nombre === document.getElementById('ceb_nom').value);
            if(c) { document.getElementById('ceb_suc').value = c.sucursal || ''; }
        }
        function autoFillVis() {
            const c = dbClientes.find(x => x.nombre === document.getElementById('v_nom').value);
            if(c) { document.getElementById('v_suc').value = c.sucursal || ''; }
        }
        function autoFillFact() {
            const c = dbClientes.find(x => x.nombre === document.getElementById('f_nom').value);
            if(c) { document.getElementById('f_id').value = c.cedula || ''; }
        }

        function addEstacion() {
            const n = document.getElementById('i_est').value;
            if(!n) return alert("Indique el número de estación");
            estTemp.push({ num: n, pro: document.getElementById('i_pro').value, inc: document.getElementById('i_inc').value });
            renderEstaciones();
            document.getElementById('i_est').value = "";
        }
        function eliminarEstacion(index) {
            estTemp.splice(index, 1);
            renderEstaciones();
        }
        function renderEstaciones() {
            document.getElementById('lista_estaciones').innerHTML = estTemp.map((e,i) => 
                `<tr><td>${e.num}</td><td>${e.pro}</td><td>${e.inc}</td><td><button type="button" class="btn-action" style="background:#dc3545; height:30px; padding:0 10px;" onclick="eliminarEstacion(${i})">X</button></td></tr>`
            ).join('');
        }

        function calcTotal() {
            const sub = (parseFloat(document.getElementById('f_pre').value) || 0) * (parseInt(document.getElementById('f_can').value) || 0);
            document.getElementById('f_iva').value = (sub * 0.13).toFixed(2);
            document.getElementById('f_tot').value = (sub * 1.13).toFixed(2);
        }

        function filtrarClientes() {
            const query = document.getElementById('inputBuscador').value.toLowerCase();
            const res = document.getElementById('resultadosBusqueda');
            res.innerHTML = "";
            if (!query.trim()) { res.style.display = "none"; return; }

            dbClientes.forEach(c => {
                if ((c.nombre || "").toLowerCase().includes(query)) {
                    const item = document.createElement('div');
                    item.className = 'search-item';
                    item.innerText = c.nombre;
                    item.onclick = () => { document.getElementById('inputBuscador').value = c.nombre; res.style.display = "none"; };
                    res.appendChild(item);
                }
            });
            res.style.display = "block";
        }

        async function ejecutarEnvio(pestana, datos, tipoContador) {
            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ pestana: pestana, datos: datos })
                });
                alert("¡Guardado exitoso!");
                if(tipoContador) {
                    cnt[tipoContador]++;
                    localStorage.setItem('tp_cnt_v25.3', JSON.stringify(cnt));
                }
                location.reload();
            } catch(e) { alert("Error de red."); }
        }

        document.getElementById('clientForm').addEventListener('submit', function(e) {
            e.preventDefault();
            ejecutarEnvio('Clientes', {
                c_con: document.getElementById('c_con').value, c_nom: document.getElementById('c_nom').value,

            ejecutarEnvio('Cebaderos', {
                ceb_con: document.getElementById('ceb_con').value, ceb_nom: document.getElementById('ceb_nom').value,

        document.getElementById('visitasForm').addEventListener('submit', function(e) {

            ejecutarEnvio('Visitas', {
                v_con: document.getElementById('v_con').value, v_nom: document.getElementById('v_nom').value,
                v_suc: document.getElementById('v_suc').value, v_fec: document.getElementById('v_fec').value,

                v_met: Array.from(document.getElementById('v_met').selectedOptions).map(o => o.value).join(", "),
                v_com: document.getElementById('v_com').value

                f_iva: document.getElementById('f_iva').value, f_tot: document.getElementById('f_tot').value
            }, 'f');
        });

        window.onload = () => { 
            loadData(); 
            updateCons(); 
            document.getElementById('c_freg').value = new Date().toISOString().split('T')[0];
        };
    </script>
